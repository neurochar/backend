syntax = "proto3";

package tenant.v1;

import "public/tenant/v1/dto.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service TenantPublicService {
  // Проверка на существование
  rpc IsExists(IsExistsRequest) returns (IsExistsResponse) {
    option (google.api.http) = {
      get: "/v1/tenant/is-exists/{text_id}"
    };
  }

  // Обновление тенанта
  rpc PatchTenant(PatchTenantRequest) returns (PatchTenantResponse) {
    option (google.api.http) = {
      patch: "/v1/tenant/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      security: {
        security_requirement: {
          key: "BearerAuth";
          value: {};
        }
      }
    };
  }
}