syntax = "proto3";

package rooms.v1;

import "public/rooms/v1/dto.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service RoomsPublicService {
  // Получить комнату
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse) {
    option (google.api.http) = {
      get: "/v1/rooms/{id}"
    };
  }

  // Начать комнату
  rpc StartRoom(StartRoomRequest) returns (StartRoomResponse) {
    option (google.api.http) = {
      post: "/v1/rooms/{id}/start"
      body: "*"
    };
  }

  // Ответить на вопрос
  rpc Answer(AnswerRequest) returns (AnswerResponse) {
    option (google.api.http) = {
      post: "/v1/rooms/{id}/answer"
      body: "*"
    };
  }
}