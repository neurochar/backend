syntax = "proto3";

package rooms.v1;

import "public/rooms/v1/dto.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service RoomsPublicService {
  // Получить комнату
  rpc GetRoom(GetRoomRequest) returns (GetRoomResponse) {
    option (google.api.http) = {
      get: "/v1/rooms/{id}"
    };
  }

  // Завершить комнату
  rpc FinishRoom(FinishRoomRequest) returns (FinishRoomResponse) {
    option (google.api.http) = {
      post: "/v1/rooms/{id}/finish"
      body: "*"
    };
  }
}