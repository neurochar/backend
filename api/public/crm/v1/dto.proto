syntax = "proto3";

package crm.v1;

import "common/types/types.proto";
import "common/types/crm_types.proto";
import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";
import "google/type/date.proto";

message ListCandidatesRequest {
  optional uint64 limit = 1;
  optional uint64 offset = 2; 
  optional string search_query = 3;
}

message ListCandidatesResponse {
  repeated types.v1.ListCandidate items = 1;
  int32 total = 2;
}

message GetCandidateRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message GetCandidateResponse {
  types.v1.Candidate item = 1;
}

message CreateCandidateRequestPayload {
  message ResumeFiles {
    string file_id = 1 [(buf.validate.field).string = {uuid: true}];
  }

  string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 150}];
  string surname = 2 [(buf.validate.field).string = {min_len: 1, max_len: 150}];
  types.v1.Gender gender = 3;
  types.v1.OptionalDate birthday = 4;
  optional ResumeFiles resume_files = 5;
}

message CreateCandidateRequest {
  CreateCandidateRequestPayload payload = 1 [(buf.validate.field).required = true];
}

message CreateCandidateResponse {
  types.v1.Candidate item = 1;
}

message PatchCandidateRequestPayload {
  message ResumeFiles {
    string file_id = 1 [(buf.validate.field).string = {uuid: true}];
  }

  optional string name = 1 [(buf.validate.field).string = {min_len: 1, max_len: 150}];
  optional string surname = 2 [(buf.validate.field).string = {min_len: 1, max_len: 150}];
  optional types.v1.Gender gender = 3;
  optional types.v1.OptionalDate birthday = 4;

  oneof resume_files_action {
    ResumeFiles resume_files = 6;
    bool resume_files_clear = 7;
  }
}

message PatchCandidateRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
  PatchCandidateRequestPayload payload = 2 [(buf.validate.field).required = true];
  int64 version = 3;
  bool skip_version_check = 4;
}

message PatchCandidateResponse {}

message DeleteCandidateRequest {
  string id = 1 [(buf.validate.field).string = {uuid: true}];
}

message DeleteCandidateResponse {}

message UploadCandidateResumeFileRequest {
  bytes file = 1;
  string filename = 2;
}

message UploadCandidateResumeFileResponse {
  types.v1.FilesMap data = 1;
}