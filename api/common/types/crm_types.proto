syntax = "proto3";

package types.v1;

import "common/types/types.proto";
import "google/type/date.proto";

message Candidate {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  string name = 4;
  string surname = 5;
  Gender gender = 6;
  optional google.type.Date birthday = 7;
  optional types.v1.File resume_file = 8;
}

message ListCandidate {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  string name = 4;
  string surname = 5;
  Gender gender = 6;
  optional google.type.Date birthday = 7;
}

enum CandidateResumeStatus {
  CANDIDATE_RESUME_STATUS_UNSPECIFIED = 0;
  CANDIDATE_RESUME_STATUS_NEW = 1;    
  CANDIDATE_RESUME_STATUS_TO_PROCESS = 2;
  CANDIDATE_RESUME_STATUS_PROCESSING = 3;
  CANDIDATE_RESUME_STATUS_PROCESSED = 4;
  CANDIDATE_RESUME_STATUS_PROCESS_ERROR = 5;
}

message CandidateResumeAnalyzeData {
	string anonymized_text = 1;
	int64 data_version = 2;
}