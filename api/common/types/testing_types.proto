syntax = "proto3";

package types.v1;

import "google/protobuf/timestamp.proto";

enum TechniqueItemType {
  TECHNIQUE_ITEM_TYPE_UNSPECIFIED = 0;
  TECHNIQUE_ITEM_TYPE_QUESTION_WITH_VARIANTS_SINGLE_ANSWER = 1;
}

enum RoomStatus {
  ROOM_STATUS_UNSPECIFIED = 0;
  ROOM_STATUS_NOT_STARTED = 1;
  ROOM_STATUS_FINISHED = 10;
}

enum PersonalityTraitType {
  PERSONALITY_TRAIT_TYPE_UNSPECIFIED = 0;
  PERSONALITY_TRAIT_TYPE_BIPOLAR = 1;
}

enum PersonalityTraitPriority {
  PRESONALITY_TRAIT_PRIORITY_NONE = 0;
  PRESONALITY_TRAIT_PRIORITY_LOW = 1;
  PRESONALITY_TRAIT_PRIORITY_MEDIUM = 2;
  PRESONALITY_TRAIT_PRIORITY_HIGH = 3;
}

enum TestingRoomResultAnalyzeHiringDecision {
  TESTING_ROOM_RESULT_ANALYZE_HIRING_DECISION_UNSPECIFIED = 0;
  TESTING_ROOM_RESULT_ANALYZE_HIRING_DECISION_HIRE = 1;
  TESTING_ROOM_RESULT_ANALYZE_HIRING_DECISION_HIRE_WITH_CONDITIONS = 2;
  TESTING_ROOM_RESULT_ANALYZE_HIRING_DECISION_DONT_HIRE = 3;
}

message PersonalityTrait {
  uint64 id = 1;
  PersonalityTraitType type = 2;
  string name = 3;
  string description = 4;
  string left_state_name = 5;
  string right_state_name = 6;
}

message ProfilePersonalityTraitsMapItem {
  PersonalityTraitPriority priority = 1;
  int32 target = 2;
}

message ProfilePersonalityTraitsMap {
  map<uint64, ProfilePersonalityTraitsMapItem> map = 1;
}

message TestingProfile {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  string name = 4;
  string description = 5;
  ProfilePersonalityTraitsMap personality_traits = 6;
}

message TestingListProfile {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  string name = 4;
}

message TestingRoomCandidate {
  string id = 1;
  string name = 2;
  string surname = 3;
}

message TestingRoomProfile {
  string id = 1;
  string name = 2;
}

message TestingRoomResultTrait {
  float match = 1;
  string tip = 2;
}

message TestingRoomResultAnalyzePersonalityFit {
  int32 score = 1;
  string summary = 2;
  repeated string key_matches = 3;
  repeated string key_gaps = 4;
}

message TestingRoomResultAnalyze {
  TestingRoomResultAnalyzeHiringDecision hiring_decision = 1;
  float confidence_score = 2;
  string main_recomendation = 3;
  repeated string risks = 4;
  repeated string action_items = 5;
  TestingRoomResultAnalyzePersonalityFit personality_fit = 6;
}

message TestingRoomResult {
  float total_match = 1;
  string total_match_tip = 2;
  map<uint64, TestingRoomResultTrait> traits = 3;
  optional TestingRoomResultAnalyze analyze = 4;
}

message TestingRoom {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  RoomStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  optional TestingRoomCandidate candidate = 6;
  optional TestingRoomProfile profile = 7;
  optional TestingRoomResult result = 8;
  optional int32 result_index = 9;
  optional google.protobuf.Timestamp finished_at = 10;
  ProfilePersonalityTraitsMap personality_traits = 11;
}

message TestingListRoom {
  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  RoomStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  optional TestingRoomCandidate candidate = 6;
  optional TestingRoomProfile profile = 7;
  optional int32 result_index = 8;
  optional TestingRoomResultAnalyzeHiringDecision hiring_decision = 9;
  optional google.protobuf.Timestamp finished_at = 10;
}


