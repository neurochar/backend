syntax = "proto3";

package types.v1;

import "common/types/types.proto";
import "google/protobuf/timestamp.proto";

message AccountTenant {
  message PhotoFiles {
    types.v1.File original_file = 1;
    types.v1.File s100x100_file = 2;
  }

  string id = 1;
  int64 version = 2;
  string tenant_id = 3;
  uint64 role_id = 4;
  string email = 5;
  bool is_confirmed = 6;
  bool is_email_verified = 7;
  bool is_blocked = 8;
  string profile_name = 9;
  string profile_surname = 10;
  optional PhotoFiles profile_photos = 11;

  optional google.protobuf.Timestamp last_login_at = 13;
  optional google.protobuf.Timestamp last_request_at = 14;
}