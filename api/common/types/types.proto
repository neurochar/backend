syntax = "proto3";

package types.v1;

import "google/type/date.proto";

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;    
  GENDER_FEMALE = 2;     
}

message File {
  string id = 1;
  string url = 2;
  string filename = 3;
}

message OptionalDate {
  optional google.type.Date date = 1;
}