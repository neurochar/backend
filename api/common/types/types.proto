syntax = "proto3";

package types.v1;

import "google/type/date.proto";

enum Gender {
  GENDER_UNSPECIFIED = 0;
  GENDER_MALE = 1;    
  GENDER_FEMALE = 2;     
}

message File {
  string url = 1;
  optional string id = 2;
  optional string filename = 3;
}

message FilesMap {
  map<string, File> map = 1;
}

message OptionalDate {
  optional google.type.Date date = 1;
}